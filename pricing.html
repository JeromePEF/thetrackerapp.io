<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing | The Tracker App</title>
    <meta name="description" content="Simple, transparent pricing for The Tracker App. Start free, upgrade when you're ready." />
    <meta name="theme-color" content="#000000" />

    <link rel="canonical" href="https://thetrackerapp.io/pricing" />
    <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="pricing.css" />
  </head>
  <body>
    <div id="pricingShell">
      <header class="site-header">
          <div class="container header-row">
            <a href="/" class="header-logo" aria-label="Home" style="display:flex; align-items:center; gap:8px; text-decoration:none;">
              <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
                <circle cx="32" cy="32" r="30.5" fill="transparent" stroke="#38ffd3" stroke-width="3"/>
                <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="32" fill="#fff">🏋️</text>
              </svg>
              <span class="logo-text-svg" style="font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 20px; color: #fff; fill: #fff; letter-spacing: -0.02em;">thetrackerapp.io</span>
            </a>
            <nav class="app-links" aria-label="App downloads">
              <a href="/">Home</a>
              <a href="/blog" data-feature="blog" hidden>Blog</a>
              <a href="/community" data-feature="community" hidden>Community</a>
              <a href="/status" data-feature="status" hidden>Status</a>
            </nav>
            <div class="header-auth">
              <span class="header-login-emoji" aria-hidden="true">🏋</span>
              <a id="loginLink" class="login-link" href="/login">Login</a>
            </div>
          </div>
        </header>

      <main class="pricing-main">
        <!-- Pricing cards are rendered dynamically from /api/control → billing.*.
             See src/pricing.js. The skeleton shown below disappears as soon
             as the live data lands so users never see a blank page. -->
        <div id="pricingContainer" class="pricing-dynamic">
          <div class="pricing-skeleton" aria-hidden="true">
            <div class="pricing-skeleton-card"></div>
            <div class="pricing-skeleton-card"></div>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <div class="container footer-row">
          <a href="/" data-feature="footer.home" hidden>Home</a>
          <a href="/blog" data-feature="footer.blog" hidden>Blog</a>
          <a href="/press" data-feature="footer.press" hidden>Press</a>
          <a href="/community" data-feature="footer.community" hidden>Community</a>
          <a href="/status" data-feature="footer.status" hidden>Status</a>
          <a href="/trust" data-feature="footer.trust" hidden>Trust</a>
          <a data-feature="footer.contact" href="mailto:contact@thetrackerapp.io">Contact</a>
          <a href="/privacy" data-feature="footer.privacy" hidden>Privacy</a>
          <a href="/terms" data-feature="footer.terms" hidden>Terms</a>
        </div>
      </footer>
    </div>
    <script type="module" src="src/pricing.js"></script>
  </body>
</html>
