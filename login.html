<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The Tracker App</title>
    <meta
      name="description"
      content="Log in with email, phone, or username to request a one-time code for The Tracker App."
    />
    <link rel="canonical" href="https://thetrackerapp.io/login" />
    <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth-pages.css" />
  </head>
  <body>
    <div class="auth-shell">
      <header class="auth-top-nav">
        <p class="auth-brand">The Tracker App</p>
        <nav class="auth-links" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/workout-resources">Workout Resources</a>
          <a href="https://dashboard.thetrackerapp.io/dashboard">Dashboard</a>
        </nav>
      </header>

      <main class="auth-main">
        <section class="auth-card request-card" aria-labelledby="loginHeading">
          <p class="auth-kicker">Account Access</p>
          <h1 id="loginHeading">Log in to The Tracker App</h1>
          <p class="auth-subtle">Enter your email, phone, or username to request a one-time code.</p>
          <p class="auth-subtle">Forgot password uses this same flow.</p>

          <form id="requestCodeForm" class="auth-form" novalidate>
            <fieldset>
              <legend>Login Options</legend>
              <div class="method-grid">
                <label>
                  <input type="radio" name="loginMethod" value="email" checked />
                  Email
                </label>
                <label>
                  <input type="radio" name="loginMethod" value="phone" />
                  Phone
                </label>
                <label>
                  <input type="radio" name="loginMethod" value="username" />
                  Username
                </label>
              </div>
            </fieldset>

            <label for="credentialInput">
              <span id="credentialLabel">Email</span>
              <input
                id="credentialInput"
                name="credential"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                autocapitalize="none"
                spellcheck="false"
                required
              />
            </label>

            <div class="auth-actions is-stack">
              <button type="submit" id="requestCodeButton" class="btn-primary">Continue</button>
            </div>
            <p id="requestStatus" class="auth-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/src/login.js"></script>
  </body>
</html>
