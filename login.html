<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The Tracker App</title>
    <meta
      name="description"
      content="Log in with the phone number on your account. If needed, recover access with the confirmed email on file."
    />
    <link rel="canonical" href="https://thetrackerapp.io/login" />
    <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth-pages.css" />
    <script>
      // If already logged in, skip the login page and go straight to the dashboard
      // (or the ?next= destination, if one was requested). Synchronous so there's
      // no flash of the login form.
      (function () {
        try {
          var flag = window.localStorage.getItem("tracker.authenticated") === "true";
          var rawUser = window.localStorage.getItem("tracker.auth.user");
          var rawSession = window.localStorage.getItem("tracker.auth.session");
          var user = null;
          var session = null;
          try { user = rawUser ? JSON.parse(rawUser) : null; } catch (e) { user = null; }
          try { session = rawSession ? JSON.parse(rawSession) : null; } catch (e) { session = null; }
          var hasUser = user && (user.accountId || user.email || user.username);
          var sessionToken = session && String(session.token || "").trim();
          var sessionExpiresAt = session && String(session.expiresAt || "").trim();
          if (!flag || !hasUser || !sessionToken) return;

          function encodeAuthPayload(value) {
            try {
              var json = JSON.stringify(value);
              var utf8 = new TextEncoder().encode(json);
              var binary = "";
              for (var index = 0; index < utf8.length; index += 1) {
                binary += String.fromCharCode(utf8[index]);
              }
              return btoa(binary);
            } catch (e) {
              return "";
            }
          }

          var params = new URLSearchParams(window.location.search);
          var requestedNext = params.get("next") || "";
          var DASHBOARD_ORIGIN = "https://dashboard.thetrackerapp.io";
          var destination = new URL(DASHBOARD_ORIGIN + "/dashboard");
          if (requestedNext) {
            try {
              var url = new URL(requestedNext, window.location.origin);
              if (url.origin === DASHBOARD_ORIGIN) {
                destination = url;
              }
            } catch (e) { /* fall through to default destination */ }
          }

          var encodedAuth = encodeAuthPayload(user);
          if (encodedAuth) {
            destination.searchParams.set("auth_payload", encodedAuth);
          }
          destination.searchParams.set("session_token", sessionToken);
          if (sessionExpiresAt) {
            destination.searchParams.set("session_expires_at", sessionExpiresAt);
          }
          window.location.replace(destination.toString());
        } catch (e) {
          // ignore; show the login form
        }
      })();
    </script>
  </head>
  <body class="login-page">
    <div class="auth-shell">
      <header class="auth-top-nav">
                <a href="/" class="header-logo auth-brand" aria-label="Home" style="margin:0; display:flex; align-items:center; gap:8px; text-decoration:none;">
            <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 28px; height: 28px;">
              <circle cx="32" cy="32" r="30.5" fill="transparent" stroke="#38ffd3" stroke-width="3"/>
              <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="28" fill="#fff">🏋️</text>
            </svg>
            <span class="logo-text-svg" style="font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 18px; color: #fff; fill: #fff; letter-spacing: -0.02em;">thetrackerapp.io</span>
          </a>
        <nav class="auth-links" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/workout-resources">Workout Resources</a>
          <a href="https://dashboard.thetrackerapp.io/dashboard">Dashboard</a>
        </nav>
      </header>

      <main class="auth-main">
        <section class="auth-card request-card" aria-labelledby="loginHeading">
          <h1 id="loginHeading">Log in or sign up</h1>
          <p id="credentialSummary" class="auth-channel-summary">
            Use the phone number, iMessage email, or Telegram username on your account. We will use the right delivery
            route based on what you enter.
          </p>

          <form id="requestCodeForm" class="auth-form" novalidate>
            <label for="credentialInput" class="auth-field">
              <span id="credentialFieldLabel" class="auth-field-label">Phone, iMessage email, or Telegram username</span>
              <div id="credentialShell" class="auth-input-shell">
                <span id="credentialIcon" class="auth-input-icon" aria-hidden="true">
                  <img id="credentialIconImage" src="" alt="" hidden />
                  <span id="credentialIconEmoji">📱</span>
                </span>
                <input
                  id="credentialInput"
                  name="credential"
                  type="text"
                  placeholder="+1 555-555-5555, yourname@icloud.com, or @fierylion"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  required
                />
              </div>
              <span id="credentialHint" class="auth-input-hint">Examples: +1 555-555-5555, yourname@icloud.com, or @fierylion.</span>
            </label>

            <div class="auth-actions is-stack">
              <button type="submit" id="requestCodeButton" class="btn-primary">Continue</button>
            </div>
            <button type="button" id="recoveryToggleButton" class="auth-inline-button">
              Trouble logging in? Use email instead.
            </button>
            <p id="requestStatus" class="auth-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/src/login.js"></script>
  </body>
</html>
