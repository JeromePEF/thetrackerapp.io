<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post | TheTrackerApp</title>
    <meta name="description" content="Read this blog post from TheTrackerApp." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://thetrackerapp.io/blog" data-default="true" />
    <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="article" />
    <meta property="og:title" content="Blog Post | TheTrackerApp" />
    <meta property="og:description" content="Read this blog post from TheTrackerApp." />
    <meta property="og:url" content="https://thetrackerapp.io/blog" />
    <meta property="og:image" content="https://thetrackerapp.io/og-image.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/info-pages.css" />
    <link rel="stylesheet" href="/blog.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "@id": "https://thetrackerapp.io/blog#Article",
        "url": "https://thetrackerapp.io/blog",
        "headline": "TheTrackerApp Blog",
        "description": "Fitness tips, workout guides, nutrition advice, and app updates from TheTrackerApp team.",
        "datePublished": "2025-01-01",
        "dateModified": "2025-06-14",
        "author": {
          "@type": "Person",
          "name": "TheTrackerApp Team"
        },
        "publisher": {
          "@type": "Organization",
          "@id": "https://thetrackerapp.io/#Organization",
          "name": "TheTrackerApp",
          "url": "https://thetrackerapp.io"
        },
        "image": "https://thetrackerapp.io/og-image.png?v=2"
      }
    </script>
  </head>
  <body>
    <div class="info-shell">
      <header class="info-nav">
        <a href="/" class="info-brand">TheTrackerApp</a>
        <nav class="info-links" aria-label="Primary">
          <a href="/blog">Blog</a>
          <a href="/press">Press</a>
          <a href="/pricing">Pricing</a>
          <a href="/tools/tdee-calculator">Free Tools</a>
          <a id="loginLink" class="info-button" href="/login">Login</a>
          <a id="dashboardLink" class="info-button" href="https://dashboard.thetrackerapp.io/dashboard" hidden>Dashboard</a>
        </nav>
      </header>

      <main class="blog-post-layout">
        <aside class="blog-sidebar" aria-label="Blog sidebar">
          <div class="blog-sidebar-section">
            <p class="blog-sidebar-title">Navigation</p>
            <nav class="blog-recent-list">
              <a href="/blog">All Posts</a>
            </nav>
          </div>

          <div class="blog-sidebar-section" id="blogPostSidebarTags" hidden>
            <p class="blog-sidebar-title">Tags</p>
            <div id="blogPostTags" class="blog-post-tags"></div>
          </div>

          <div class="blog-sidebar-section" id="blogPostSidebarMeta" hidden>
            <p class="blog-sidebar-title">Published</p>
            <p id="blogPostDate" class="blog-sidebar-meta"></p>
          </div>

          <div class="blog-sidebar-section" id="blogPostSidebarAuthor" hidden>
            <p class="blog-sidebar-title">Author</p>
            <p id="blogPostAuthor" class="blog-sidebar-meta"></p>
          </div>
        </aside>

        <article class="blog-post-article">
          <header class="info-hero blog-hero">
            <p class="info-kicker" id="blogPostKicker">Blog Post</p>
            <h1 id="blogPostTitle">Loading...</h1>
          </header>

          <div id="blogPostFeaturedImage" class="blog-post-featured-image" hidden>
            <img id="blogPostFeaturedImg" src="" alt="" />
          </div>

          <section class="blog-post-content-section" id="blogPostContent">
            <p class="loading-state">Loading post...</p>
          </section>

          <nav class="blog-post-back">
            <a href="/blog">&larr; Back to Blog</a>
          </nav>
        </article>
      </main>

      <footer class="legal-footer">
        <p>&copy; 2026 TheTrackerApp &middot; <a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms</a> &middot; <a href="/status">Status</a> &middot; <a href="/blog">Blog</a></p>
      </footer>
    </div>

    <script type="module" src="/src/blog-post.js"></script>
  </body>
</html>
