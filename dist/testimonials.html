<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonials | The Tracker App</title>
    <meta name="description" content="See what our users say about tracking workouts, nutrition, and fitness goals via iMessage, SMS, Telegram, and more." />
    <link rel="canonical" href="https://thetrackerapp.io/testimonials" />
    <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #000000;
        --ink: #ecf4ff;
        --ink-muted: #8a96a8;
        --accent: #38ffd3;
      }
      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: var(--bg);
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
      }

      a { color: var(--accent); }

      .testimonials-page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      .testimonials-hero {
        text-align: center;
        margin-bottom: 1.5rem;
        position: relative;
        z-index: 100;
      }

      .testimonials-hero h1 {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        color: #fff;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .testimonials-hero p {
        color: var(--ink-muted);
        font-size: clamp(0.85rem, 1.4vw, 1rem);
        max-width: 520px;
        margin: 0 auto;
      }

      .testimonials-back {
        display: inline-block;
        color: var(--ink-muted);
        text-decoration: none;
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
        transition: color 0.15s;
      }
      .testimonials-back:hover { color: var(--accent); }

      /* Floating card wall */
      .testimonials-wall {
        position: relative;
        width: 100%;
        min-height: clamp(800px, 80vw, 1400px);
        overflow: hidden;
      }

      .testimonial-card {
        position: absolute;
        cursor: pointer;
        perspective: 600px;
        z-index: 1;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      .testimonial-card-inner {
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .testimonial-card.is-flipped .testimonial-card-inner {
        transform: rotateY(180deg);
      }

      .testimonial-card-front,
      .testimonial-card-back {
        backface-visibility: hidden;
        border-radius: 16px;
        border: 1px solid rgba(166, 193, 225, 0.2);
      }

      .testimonial-card-front {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: rgba(255, 255, 255, 0.04);
        padding: 0.5rem 0.75rem;
        white-space: nowrap;
        backdrop-filter: blur(6px);
      }

      .testimonial-card-avatar {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: rgba(56, 255, 211, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent);
        font-family: "Orbitron", sans-serif;
      }

      .testimonial-card-name {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
      }

      .testimonial-card-back {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: rotateY(180deg) translate(50%, -50%);
        background: rgba(11, 14, 17, 0.95);
        padding: 0.75rem 1rem;
        min-width: 180px;
        max-width: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
      }

      .testimonial-card-back p {
        color: var(--ink-muted);
        font-size: 0.72rem;
        line-height: 1.45;
        text-align: center;
      }

      .testimonial-card-back .testimonial-stars {
        color: #ffb347;
        font-size: 0.7rem;
        letter-spacing: 2px;
        margin-bottom: 0.25rem;
      }

      @keyframes float-0 {
        0% { transform: translateY(0) translateX(0); }
        100% { transform: translateY(-12px) translateX(6px); }
      }
      @keyframes float-1 {
        0% { transform: translateY(0) translateX(0); }
        100% { transform: translateY(-10px) translateX(-8px); }
      }
      @keyframes float-2 {
        0% { transform: translateY(0) translateX(0); }
        100% { transform: translateY(-14px) translateX(4px); }
      }
      @keyframes float-3 {
        0% { transform: translateY(0) translateX(0); }
        100% { transform: translateY(-8px) translateX(-5px); }
      }

      .testimonials-wall-header {
        position: sticky;
        top: 1rem;
        z-index: 50;
        text-align: center;
        pointer-events: none;
        margin-bottom: -2rem;
      }
      .testimonials-wall-header span {
        display: inline-block;
        background: rgba(0,0,0,0.8);
        border: 1px solid rgba(56,255,211,0.2);
        border-radius: 999px;
        padding: 0.35rem 1rem;
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        color: var(--accent);
        text-transform: uppercase;
      }

      @media (max-width: 768px) {
        .testimonials-wall {
          min-height: clamp(600px, 150vh, 1200px);
        }
        .testimonial-card-front {
          padding: 0.35rem 0.5rem;
        }
        .testimonial-card-name { font-size: 0.7rem; }
        .testimonial-card-avatar { width: 1.6rem; height: 1.6rem; font-size: 0.6rem; }
      }
    </style>
    <script type="module" crossorigin src="/assets/testimonials-B0aL3Hgt.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-Dg3W3odj.js">
    <link rel="stylesheet" crossorigin href="/assets/styles-CumSny1d.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <a href="/" class="header-logo" aria-label="Home" style="display:flex; align-items:center; gap:8px; text-decoration:none;">
          <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
            <circle cx="32" cy="32" r="30.5" fill="transparent" stroke="#38ffd3" stroke-width="3"/>
            <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="32" fill="#fff">🏋️</text>
          </svg>
          <span style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:20px; color:#fff;">thetrackerapp.io</span>
        </a>
        <nav class="app-links" aria-label="Navigation">
          <a href="/pricing">Pricing</a>
        </nav>
      </div>
    </header>

    <main class="testimonials-page">
      <div class="testimonials-hero">
        <a href="/" class="testimonials-back">← Back home</a>
        <h1>What Our Users Say</h1>
        <p>Real feedback from people tracking their fitness with The Tracker App. Click any card to flip it.</p>
      </div>

      <div class="testimonials-wall" id="testimonialsWall">
        <div class="testimonials-wall-header">
          <span>Click any card to flip</span>
        </div>
      </div>
    </main>

  </body>
</html>
