<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Status | TheTrackerApp</title>
    <meta name="description" content="Real-time system status for TheTrackerApp services — chatbot, payments, iMessage delivery, and web dashboard." />
    <meta name="theme-color" content="#000000" />
    <!-- Status page is transient — don't index outage states. -->
    <meta name="robots" content="noindex, follow" />

    <link rel="canonical" href="https://thetrackerapp.io/status" />
    <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/status-BrDRwZyo.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-BNRNPu-U.js">
    <link rel="stylesheet" crossorigin href="/assets/status-CcrKCH2d.css">
  </head>
  <body>
    <div class="status-page">
      <header class="status-header">
        <a href="/" class="header-logo status-logo" aria-label="Home" style="display:flex; align-items:center; gap:8px; text-decoration:none;">
          <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 28px; height: 28px;">
            <circle cx="32" cy="32" r="30.5" fill="transparent" stroke="#38ffd3" stroke-width="3"/>
            <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="28" fill="#fff">🏋️</text>
          </svg>
          <span class="logo-text-svg" style="font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 18px; color: #fff; fill: #fff; letter-spacing: -0.02em;">thetrackerapp.io</span>
        </a>
        <span class="status-title">System Status</span>
      </header>

      <main class="status-main">
        <!-- Overall status banner. data-tone is set by status.js based on
             the response from /api/status. Each tone (operational / degraded
             / partial / major / maintenance) maps to a colored band in
             status.css, paired with a unicode glyph + label so we never
             rely on color alone (WCAG AA). -->
        <section class="status-banner" id="overallStatus" data-tone="operational" role="status">
          <div class="status-icon" data-tone="operational" aria-hidden="true">
            <span>✓</span>
          </div>
          <div class="status-text">
            <h1>Loading status…</h1>
            <p class="status-updated">Last updated: <span id="lastUpdated">—</span></p>
          </div>
        </section>

        <!-- Per-component status list (Chatbot, Payments, iMessage, Web).
             Populated by status.js from /api/status's components[] array. -->
        <section class="services-section" aria-label="Component status">
          <h2>Components</h2>
          <div class="services-grid" id="servicesGrid">
            <div class="status-skeleton"></div>
            <div class="status-skeleton"></div>
            <div class="status-skeleton"></div>
            <div class="status-skeleton"></div>
          </div>
        </section>

        <p class="status-support" id="statusSupport">Questions? <a href="mailto:support@thetrackerapp.io">support@thetrackerapp.io</a></p>

        <!-- Uptime — 90-day bar chart -->
        <section class="uptime-section" id="uptimeSection">
          <h2>Uptime</h2>
          <div class="uptime-summary">
            <span class="uptime-percent" id="uptimePercent">—</span>
            <span class="uptime-label">last 90 days</span>
          </div>
          <div class="uptime-bars" id="uptimeBars" role="img" aria-label="90-day uptime chart">
            <!-- JS populates 90 bars -->
          </div>
          <div class="uptime-legend">
            <span class="legend-item legend-operational">Operational</span>
            <span class="legend-item legend-degraded">Degraded</span>
            <span class="legend-item legend-outage">Outage</span>
          </div>
        </section>
      </main>

      <footer class="status-footer">
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="mailto:support@thetrackerapp.io">Contact</a>
        </div>
        <p class="footer-note">Status refreshes every 60 seconds · © 2026 TheTrackerApp</p>
      </footer>
    </div>

  </body>
</html>
