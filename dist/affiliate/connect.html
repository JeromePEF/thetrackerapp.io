  <body>
    <div class="auth-shell">
      <header class="auth-top-nav">
        <a href="/" class="header-logo auth-brand" aria-label="Home" style="margin:0; display:flex; align-items:center; gap:8px; text-decoration:none;">
            <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
              <circle cx="32" cy="32" r="30.5" fill="transparent" stroke="#38ffd3" stroke-width="3"/>
              <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="32" fill="#fff">🏋️</text>
            </svg>
            <span class="logo-text-svg" style="font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 20px; color: #fff; fill: #fff; letter-spacing: -0.02em; text-transform: none;">thetrackerapp.io</span>
          </a>
        <nav class="auth-links" aria-label="Primary">
          <a href="https://dashboard.thetrackerapp.io/dashboard?view=affiliate">Dashboard</a>
        </nav>
      </header>

      <main class="auth-main">
        <section class="auth-card affiliate-card" aria-labelledby="connectHeading">
          <p class="auth-kicker">Stripe Connect</p>
          <h1 id="connectHeading">Checking your Stripe account…</h1>
          <p id="connectMessage" class="auth-subtle" aria-live="polite">
            One moment while we confirm your payout setup with Stripe.
          </p>

          <ul class="affiliate-status-list" id="connectStatusList" hidden>
            <li><strong>Status:</strong> <span id="connectStatusValue">—</span></li>
            <li><strong>Charges enabled:</strong> <span id="connectChargesValue">—</span></li>
            <li><strong>Payouts enabled:</strong> <span id="connectPayoutsValue">—</span></li>
          </ul>

          <div class="auth-actions is-stack">
            <a id="connectDashboardLink" class="btn-primary" href="https://dashboard.thetrackerapp.io/dashboard?view=affiliate">Back to dashboard</a>
            <button id="connectRetryButton" type="button" class="btn-secondary" hidden>Resume onboarding</button>
          </div>
        </section>
      </main>
    </div>

  </body>
