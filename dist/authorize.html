<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize Device | The Tracker App</title>
    <meta
      name="description"
      content="Enter your one-time code to authorize this device and continue to your Tracker dashboard."
    />
    <link rel="canonical" href="https://thetrackerapp.io/authorize" />
    <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/authorize-BmLT5-Fu.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-BJzIe6l4.js">
    <link rel="modulepreload" crossorigin href="/assets/google-analytics-DEhgzEy6.js">
    <link rel="modulepreload" crossorigin href="/assets/api-IjnKPKo1.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-pages-so5Bh94e.css">
  </head>
  <body>
    <div class="auth-shell">
      <header class="auth-top-nav">
        <p class="auth-brand">The Tracker App</p>
        <nav class="auth-links" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/workout-resources">Workout Resources</a>
          <a href="/login">Login</a>
        </nav>
      </header>

      <main class="auth-main">
        <section class="auth-card device-card" aria-labelledby="authorizeHeading">
          <h1 id="authorizeHeading">Authorize Device</h1>
          <p class="auth-subtle">Enter the generated code to authenticate this device to your account.</p>
          <p class="requested-target">Code requested for <strong id="requestedTargetValue">-</strong></p>

          <form id="verifyCodeForm" class="auth-form" novalidate>
            <div id="otpContainer" class="otp-container" aria-label="Device code input">
              <span class="otp-slot" data-otp-index="0"></span>
              <span class="otp-slot" data-otp-index="1"></span>
              <span class="otp-slot" data-otp-index="2"></span>
              <span class="otp-slot" data-otp-index="3"></span>
              <span class="otp-divider" aria-hidden="true">-</span>
              <span class="otp-slot" data-otp-index="4"></span>
              <span class="otp-slot" data-otp-index="5"></span>
              <span class="otp-slot" data-otp-index="6"></span>
              <span class="otp-slot" data-otp-index="7"></span>
              <input
                id="deviceCodeInput"
                name="deviceCode"
                type="text"
                inputmode="text"
                autocomplete="one-time-code"
                autocapitalize="characters"
                spellcheck="false"
                maxlength="8"
                aria-label="Device Code"
                required
              />
            </div>

            <div class="device-context">
              <p><strong>Requested account:</strong> <span id="requestedDeviceValue">-</span></p>
              <p><strong>Session:</strong> <span id="deviceSessionValue">-</span></p>
              <p><strong>Requested at:</strong> <span id="requestedAtValue">-</span></p>
            </div>

            <div class="auth-actions is-stack">
              <button id="verifyCodeButton" type="submit" class="btn-primary">Allow</button>
              <button type="button" id="resendCodeButton" class="btn-secondary">Resend code</button>
              <button type="button" id="editIdentifierButton" class="btn-tertiary">Use different login</button>
            </div>
            <p id="verifyStatus" class="auth-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

  </body>
</html>
