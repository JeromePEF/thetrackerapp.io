<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Tracker App tracks workouts, nutrition, water, and progress">
  <defs>
    <linearGradient id="redFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3a34" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ff3a34" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ff3a34" stop-opacity="0.58"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#040404"/>
  <rect width="1200" height="630" fill="url(#redFade)"/>

  <rect x="44" y="44" width="1112" height="542" rx="26" fill="none" stroke="url(#gridLine)" stroke-width="2"/>

  <text x="92" y="130" fill="#ff5a55" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="30" letter-spacing="2">THE TRACKER APP</text>
  <text x="92" y="214" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72">Track Workouts and Nutrition</text>
  <text x="92" y="264" fill="#e3e3e3" font-family="Arial, Helvetica, sans-serif" font-size="31">Water intake, progress trends, and leaderboard momentum.</text>

  <rect x="92" y="312" width="234" height="96" rx="14" fill="#0e0e0e" stroke="#313131"/>
  <text x="122" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42">🏋️</text>
  <text x="180" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34">Workouts</text>

  <rect x="344" y="312" width="268" height="96" rx="14" fill="#0e0e0e" stroke="#313131"/>
  <text x="376" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42">🍽️</text>
  <text x="434" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34">Nutrition</text>

  <rect x="630" y="312" width="224" height="96" rx="14" fill="#0e0e0e" stroke="#313131"/>
  <text x="662" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42">💧</text>
  <text x="720" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34">Water</text>

  <rect x="872" y="312" width="230" height="96" rx="14" fill="#0e0e0e" stroke="#313131"/>
  <text x="904" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42">📈</text>
  <text x="962" y="368" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34">Progress</text>

  <rect x="92" y="448" width="460" height="86" rx="12" fill="#e53935"/>
  <text x="128" y="503" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="35">BUILD CONSISTENT RESULTS</text>

  <circle cx="948" cy="482" r="120" fill="none" stroke="#ff3a34" stroke-opacity="0.45" stroke-width="3"/>
  <circle cx="948" cy="482" r="94" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  <text x="948" y="526" text-anchor="middle" fill="#ffffff" font-size="170">🏋️</text>
</svg>
